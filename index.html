<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybernetica — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:    #f4f3f1;
    --bg2:   #eceae6;
    --ink:   #1a1917;
    --mid:   #5a5854;
    --muted: #9e9b96;
    --faint: #d6d3cd;
    --white: #fdfcfa;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    padding: 36px 60px 28px;
    border-bottom: 1px solid var(--faint);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.1s forwards;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo em { font-style: italic; color: var(--muted); }

  .header-meta {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.9;
  }

  /* LEFT */
  .left {
    padding: 56px 56px 56px;
    border-right: 1px solid var(--faint);
    display: flex;
    flex-direction: column;
    gap: 48px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.2s forwards;
  }

  .hero-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 4.5vw, 68px);
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -2px;
    margin-bottom: 24px;
  }
  .hero-title em { font-style: italic; color: var(--muted); }

  .hero-sub {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.9;
    max-width: 300px;
  }

  /* RINGS */
  .rings-block {}
  .rings-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .rings-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .ring-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .ring-wrap {
    position: relative;
    width: 76px;
    height: 76px;
  }

  .ring-wrap svg {
    transform: rotate(-90deg);
    width: 76px; height: 76px;
  }

  .ring-bg   { fill: none; stroke: var(--faint); stroke-width: 5; }
  .ring-fill { fill: none; stroke-width: 5; stroke-linecap: round;
    stroke-dasharray: 198;
    stroke-dashoffset: 198;
    transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
  }
  .rf-dark   { stroke: var(--ink); }
  .rf-mid    { stroke: var(--mid); }
  .rf-muted  { stroke: var(--muted); }

  .ring-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .ring-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
    max-width: 76px;
    line-height: 1.5;
    text-transform: uppercase;
  }

  /* BARS */
  .bars-block {}
  .bars-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 88px 1fr 44px;
    gap: 10px;
    align-items: center;
    margin-bottom: 11px;
  }

  .bar-label { font-size: 10px; color: var(--muted); }
  .bar-track { height: 3px; background: var(--faint); border-radius: 2px; overflow: hidden; }
  .bar-fill  { height: 100%; background: var(--ink); border-radius: 2px; width: 0;
    transition: width 1.2s cubic-bezier(.4,0,.2,1); }
  .bar-val   { font-size: 10px; color: var(--mid); text-align: right; }

  /* RIGHT */
  .right {
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.3s forwards;
  }

  .tool-card {
    flex: 1;
    padding: 52px 52px 44px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    transition: background 0.25s;
    border-bottom: 1px solid var(--faint);
  }
  .tool-card:last-child { border-bottom: none; }
  .tool-card:hover { background: var(--white); }

  /* CIRCLE DECORATION */
  .tool-card .deco-ring {
    position: absolute;
    right: -50px;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 48px solid var(--faint);
    opacity: 0.35;
    transition: opacity 0.3s, transform 0.4s;
    pointer-events: none;
  }
  .tool-card .deco-ring-inner {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 18px solid var(--bg2);
    opacity: 0.5;
    transition: opacity 0.3s, transform 0.4s;
    pointer-events: none;
  }
  .tool-card:hover .deco-ring       { opacity: 0.6; transform: translateY(-50%) scale(1.06); }
  .tool-card:hover .deco-ring-inner { opacity: 0.9; transform: translateY(-50%) scale(1.04); }

  /* SECTOR QUARTER */
  .tool-card .deco-sector {
    position: absolute;
    left: -40px;
    bottom: -40px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--faint);
    opacity: 0.2;
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .tool-card:hover .deco-sector { opacity: 0.35; }

  .card-num {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    position: relative; z-index: 1;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.5px;
    position: relative; z-index: 1;
  }

  .card-desc {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.8;
    max-width: 270px;
    position: relative; z-index: 1;
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    position: relative; z-index: 1;
  }

  .pill {
    font-size: 9px;
    padding: 3px 10px;
    border: 1px solid var(--faint);
    color: var(--muted);
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }
  .tool-card:hover .pill { border-color: var(--muted); color: var(--mid); }

  .card-arrow {
    font-size: 18px;
    color: var(--faint);
    margin-top: auto;
    transition: color 0.2s, transform 0.2s;
    position: relative; z-index: 1;
    width: fit-content;
  }
  .tool-card:hover .card-arrow { color: var(--ink); transform: translateX(6px); }

  /* FOOTER */
  footer {
    grid-column: 1 / -1;
    padding: 18px 60px;
    border-top: 1px solid var(--faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.5s forwards;
  }

  .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--mid);
    margin-right: 7px;
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  @media (max-width: 768px) {
    .page { grid-template-columns: 1fr; }
    .left { border-right: none; border-bottom: 1px solid var(--faint); padding: 40px 28px; }
    .tool-card { padding: 36px 28px; }
    header, footer { padding: 24px 28px; }
    .tool-card .deco-ring, .tool-card .deco-ring-inner { display: none; }
  }
</style>
</head>
<body>
<div class="page">

<header>
  <div class="logo">Aleks<em>eenkovads</em></div>
  <div class="header-meta">github.io / Cybernetica<br>Май 2026</div>
</header>

<div class="left">
  <div>
    <div class="hero-label">// workspace</div>
    <h1 class="hero-title">Cyber<br>netica<br><em>workspace</em></h1>
    <p class="hero-sub">Документы агентства: лендинг, управление, автоматизация и аналитика рынка.</p>
  </div>

  <div class="rings-block">
    <div class="rings-title">// что внутри</div>
    <div class="rings-row" id="rings">
      <div class="ring-item">
        <div class="ring-wrap">
          <svg viewBox="0 0 76 76"><circle class="ring-bg" cx="38" cy="38" r="31.5"/><circle class="ring-fill rf-dark" cx="38" cy="38" r="31.5" data-pct="88"/></svg>
          <div class="ring-num">03</div>
        </div>
        <div class="ring-label">Лендинг</div>
      </div>
      <div class="ring-item">
        <div class="ring-wrap">
          <svg viewBox="0 0 76 76"><circle class="ring-bg" cx="38" cy="38" r="31.5"/><circle class="ring-fill rf-mid" cx="38" cy="38" r="31.5" data-pct="52"/></svg>
          <div class="ring-num">RU</div>
        </div>
        <div class="ring-label">Брифинг</div>
      </div>
      <div class="ring-item">
        <div class="ring-wrap">
          <svg viewBox="0 0 76 76"><circle class="ring-bg" cx="38" cy="38" r="31.5"/><circle class="ring-fill rf-dark" cx="38" cy="38" r="31.5" data-pct="65"/></svg>
          <div class="ring-num">AI</div>
        </div>
        <div class="ring-label">Интеграция</div>
      </div>
      <div class="ring-item">
        <div class="ring-wrap">
